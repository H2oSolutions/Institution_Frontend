<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Analytics | HelloSchool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="js/config-v2.js"></script>
<script src="js/api.js"></script>
<style>
:root{
  --brand:#6366f1;--brand2:#8b5cf6;
  --brand-grad:linear-gradient(135deg,#6366f1,#8b5cf6);
  --surface:#fff;--surface2:#f8fafc;--border:#e2e8f0;
  --text:#0f172a;--text2:#475569;--text3:#94a3b8;
  --green:#10b981;--green-bg:#f0fdf4;--green-border:#bbf7d0;
  --red:#ef4444;--red-bg:#fef2f2;--red-border:#fecaca;
  --amber:#f59e0b;--amber-bg:#fffbeb;--amber-border:#fde68a;
  --blue:#3b82f6;--orange:#ea580c;
  --shadow:0 2px 16px rgba(0,0,0,.06);
  --radius:16px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#f1f5f9;color:var(--text);min-height:100vh}

/* ── HEADER ── */
.pa-header{
  background:var(--brand-grad);color:#fff;
  padding:15px 28px;display:flex;align-items:center;
  justify-content:space-between;gap:12px;
  position:sticky;top:0;z-index:200;
  box-shadow:0 4px 24px rgba(99,102,241,.3)
}
.pa-back-btn{
  background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.25);
  color:#fff;border-radius:999px;padding:6px 15px;
  font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:.2s
}
.pa-back-btn:hover{background:rgba(255,255,255,.25)}
.pa-header h1{font-size:clamp(1rem,2.5vw,1.35rem);font-weight:900}
.pa-header-right{display:flex;align-items:center;gap:10px}
.pa-session-select{
  background:rgba(255,255,255,.18);border:1.5px solid rgba(255,255,255,.3);
  color:#fff;border-radius:999px;padding:5px 14px;
  font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;
  outline:none;
}
.pa-session-select option{background:#6366f1;color:#fff}

/* ── CONTAINER ── */
.pa-container{max-width:1200px;margin:0 auto;padding:24px 18px 80px}

/* ── LOADING / ERROR ── */
.pa-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;gap:16px}
.pa-spinner{width:40px;height:40px;border:4px solid #e2e8f0;border-top-color:var(--brand);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.pa-error{background:var(--red-bg);border:1.5px solid var(--red-border);border-radius:var(--radius);padding:24px;text-align:center;color:var(--red)}

/* ── SUMMARY CARDS ── */
.pa-summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-bottom:24px}
.pa-stat-card{
  background:#fff;border-radius:var(--radius);padding:20px;
  box-shadow:var(--shadow);border:1.5px solid var(--border);
  display:flex;flex-direction:column;gap:4px;
  animation:fadeUp .35s ease both;position:relative;overflow:hidden
}
.pa-stat-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:var(--card-color,var(--brand-grad))
}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.pa-stat-icon{
  width:42px;height:42px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;margin-bottom:8px;flex-shrink:0
}
.pa-stat-label{font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em}
.pa-stat-value{font-size:26px;font-weight:900;color:var(--text);line-height:1.1;font-family:'JetBrains Mono',monospace}
.pa-stat-sub{font-size:12px;color:var(--text3);font-weight:500;margin-top:2px}

/* ── ONLINE PERCENT BAR ── */
.pa-percent-bar-wrap{margin-top:10px}
.pa-percent-label{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);font-weight:600;margin-bottom:4px}
.pa-percent-track{height:8px;background:#e2e8f0;border-radius:4px;overflow:hidden}
.pa-percent-fill{height:100%;background:var(--brand-grad);border-radius:4px;transition:width .8s cubic-bezier(.4,0,.2,1)}

/* ── SECTION TITLE ── */
.pa-section{margin-bottom:24px}
.pa-section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.pa-section-title{font-size:16px;font-weight:800;color:var(--text);display:flex;align-items:center;gap:8px}
.pa-section-title span{font-size:20px}

/* ── CHARTS ROW ── */
.pa-charts-row{display:grid;grid-template-columns:1fr 1.8fr;gap:16px;margin-bottom:24px}
@media(max-width:768px){.pa-charts-row{grid-template-columns:1fr}}
.pa-chart-card{
  background:#fff;border-radius:var(--radius);padding:20px;
  box-shadow:var(--shadow);border:1.5px solid var(--border)
}
.pa-chart-card h3{font-size:14px;font-weight:800;color:var(--text);margin-bottom:4px}
.pa-chart-card p{font-size:12px;color:var(--text3);margin-bottom:16px}
.pa-chart-wrap{position:relative}
.pa-donut-legend{display:flex;flex-direction:column;gap:10px;margin-top:16px}
.pa-legend-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.pa-legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.pa-legend-label{font-size:13px;font-weight:600;color:var(--text2);flex:1}
.pa-legend-amount{font-size:13px;font-weight:800;color:var(--text);font-family:'JetBrains Mono',monospace}
.pa-legend-pct{font-size:11px;color:var(--text3);font-weight:600;background:var(--surface2);border-radius:6px;padding:2px 6px}

/* ── RECENT TABLE ── */
.pa-table-card{
  background:#fff;border-radius:var(--radius);
  box-shadow:var(--shadow);border:1.5px solid var(--border);overflow:hidden
}
.pa-table-head{
  display:grid;grid-template-columns:2fr 1.5fr 1.2fr 1.2fr 1.4fr;
  padding:10px 20px;background:var(--surface2);
  border-bottom:1.5px solid var(--border);gap:8px
}
.pa-table-head span{font-size:11px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:.07em}
.pa-table-row{
  display:grid;grid-template-columns:2fr 1.5fr 1.2fr 1.2fr 1.4fr;
  padding:13px 20px;border-bottom:1px solid #f1f5f9;
  gap:8px;align-items:center;transition:.15s
}
.pa-table-row:last-child{border-bottom:none}
.pa-table-row:hover{background:#f8fafc}
.pa-cell{font-size:13px;font-weight:600;color:var(--text2)}
.pa-cell.name{font-weight:700;color:var(--text)}
.pa-cell.amount{font-weight:800;color:var(--text);font-family:'JetBrains Mono',monospace}
.pa-cell.pid{font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pa-badge{display:inline-flex;align-items:center;gap:4px;border-radius:6px;padding:3px 8px;font-size:11px;font-weight:800}
.pa-badge.online{background:#eef2ff;color:#4f46e5}
.pa-badge.cash{background:#f0fdf4;color:#059669}

/* ── EMPTY STATE ── */
.pa-empty{display:flex;flex-direction:column;align-items:center;padding:48px 20px;gap:12px}
.pa-empty-icon{font-size:48px;opacity:.3}
.pa-empty p{font-size:14px;color:var(--text3);font-weight:600}

/* ── TOAST ── */
.pa-toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  background:#1e293b;color:#fff;padding:11px 20px;border-radius:10px;
  font-size:13px;font-weight:700;z-index:9999;
  transition:transform .3s ease,opacity .3s;opacity:0;pointer-events:none;white-space:nowrap
}
.pa-toast.show{transform:translateX(-50%) translateY(0);opacity:1}

@media(max-width:640px){
  .pa-table-head,.pa-table-row{grid-template-columns:2fr 1fr 1fr}
  .pa-table-head span:nth-child(4),.pa-table-head span:nth-child(5),
  .pa-cell:nth-child(4),.pa-cell:nth-child(5){display:none}
  .pa-summary-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<!-- ── HEADER ── -->
<header class="pa-header">
  <div style="display:flex;align-items:center;gap:12px">
    <button class="pa-back-btn" onclick="history.back()">← Back</button>
    <h1>📊 Payment Analytics</h1>
  </div>
  <div class="pa-header-right">
    <select class="pa-session-select" id="sessionSelect" onchange="loadAnalytics()"></select>
  </div>
</header>

<!-- ── MAIN ── -->
<main class="pa-container" id="mainContent">
  <div class="pa-loading" id="loadingState">
    <div class="pa-spinner"></div>
    <p style="color:var(--text3);font-weight:600">Loading analytics...</p>
  </div>
</main>

<div class="pa-toast" id="paToast"></div>

<script>
'use strict';

const API_ANALYTICS = `${API_BASE_URL}/fee/analytics/payments`;

// ── Session helper ────────────────────────────────────────────────────────────
function currentSession(){
  const d = new Date(), y = d.getFullYear(), m = d.getMonth()+1;
  return m >= 4 ? `${y}-${String(y+1).slice(-2)}` : `${y-1}-${String(y).slice(-2)}`;
}
function buildSessions(){
  const cur  = currentSession();
  const py   = parseInt(cur.split('-')[0]);
  const prev = `${py-1}-${String(py).slice(-2)}`;
  const sel  = document.getElementById('sessionSelect');
  [cur, prev].forEach(s => {
    const o = document.createElement('option');
    o.value = s; o.textContent = s;
    sel.appendChild(o);
  });
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function toast(msg){ const t=document.getElementById('paToast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2800); }

// ── Format ────────────────────────────────────────────────────────────────────
function fmtRs(n){ return '₹'+Number(n||0).toLocaleString('en-IN'); }
function fmtDate(iso){
  if(!iso) return '—';
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const p=iso.slice(0,10).split('-');
  return `${p[2]} ${months[parseInt(p[1])-1]} ${p[0]}`;
}

// ── Charts storage ────────────────────────────────────────────────────────────
let donutChart = null;
let barChart   = null;

// ── Main load ─────────────────────────────────────────────────────────────────
async function loadAnalytics(){
  const session = document.getElementById('sessionSelect').value;
  const main    = document.getElementById('mainContent');
  main.innerHTML = `<div class="pa-loading"><div class="pa-spinner"></div><p style="color:var(--text3);font-weight:600">Loading analytics...</p></div>`;

  // Destroy old charts
  if(donutChart){ donutChart.destroy(); donutChart=null; }
  if(barChart)  { barChart.destroy();   barChart=null;   }

  try {
    const res = await apiGet(`${API_ANALYTICS}?session=${encodeURIComponent(session)}`, true);
    if(!res.success) throw new Error(res.message || 'Failed to load');
    render(res.data, session);
  } catch(e){
    main.innerHTML = `<div class="pa-error"><p style="font-size:15px;font-weight:800;margin-bottom:6px">Failed to load analytics</p><p style="font-size:13px">${e.message}</p><button onclick="loadAnalytics()" style="margin-top:14px;background:#ef4444;color:#fff;border:none;border-radius:8px;padding:8px 18px;font-family:inherit;font-weight:800;cursor:pointer">Retry</button></div>`;
  }
}

// ── Render ────────────────────────────────────────────────────────────────────
function render(data, session){
  const { summary, monthlyTrend, recentOnlinePayments } = data;
  const main = document.getElementById('mainContent');

  const totalAmt    = summary.totalCollected || 0;
  const onlineAmt   = summary.online?.amount || 0;
  const cashAmt     = summary.cash?.amount   || 0;
  const onlineCount = summary.online?.count  || 0;
  const cashCount   = summary.cash?.count    || 0;
  const onlinePct   = summary.onlinePercent  || 0;

  main.innerHTML = `
    <!-- SUMMARY CARDS -->
    <div class="pa-summary-grid">
      <div class="pa-stat-card" style="--card-color:linear-gradient(135deg,#6366f1,#8b5cf6);animation-delay:.05s">
        <div class="pa-stat-icon" style="background:#eef2ff">💰</div>
        <div class="pa-stat-label">Total Collected</div>
        <div class="pa-stat-value">${fmtRs(totalAmt)}</div>
        <div class="pa-stat-sub">Session ${session}</div>
      </div>
      <div class="pa-stat-card" style="--card-color:linear-gradient(135deg,#6366f1,#3b82f6);animation-delay:.1s">
        <div class="pa-stat-icon" style="background:#eef2ff">📱</div>
        <div class="pa-stat-label">Online Payments</div>
        <div class="pa-stat-value">${fmtRs(onlineAmt)}</div>
        <div class="pa-stat-sub">${onlineCount} transactions</div>
        <div class="pa-percent-bar-wrap">
          <div class="pa-percent-label"><span>Online share</span><span>${onlinePct}%</span></div>
          <div class="pa-percent-track"><div class="pa-percent-fill" style="width:${onlinePct}%"></div></div>
        </div>
      </div>
      <div class="pa-stat-card" style="--card-color:linear-gradient(135deg,#10b981,#059669);animation-delay:.15s">
        <div class="pa-stat-icon" style="background:#f0fdf4">🏦</div>
        <div class="pa-stat-label">Cash Payments</div>
        <div class="pa-stat-value">${fmtRs(cashAmt)}</div>
        <div class="pa-stat-sub">${cashCount} transactions</div>
      </div>
      <div class="pa-stat-card" style="--card-color:linear-gradient(135deg,#f59e0b,#ea580c);animation-delay:.2s">
        <div class="pa-stat-icon" style="background:#fffbeb">🧾</div>
        <div class="pa-stat-label">Total Transactions</div>
        <div class="pa-stat-value">${(onlineCount + cashCount).toLocaleString()}</div>
        <div class="pa-stat-sub">Online + Cash combined</div>
      </div>
    </div>

    <!-- CHARTS ROW -->
    <div class="pa-charts-row">
      <!-- Donut -->
      <div class="pa-chart-card">
        <h3>Collection Split</h3>
        <p>Online vs cash breakdown</p>
        <div class="pa-chart-wrap" style="max-height:200px;display:flex;justify-content:center">
          <canvas id="donutCanvas" style="max-height:200px"></canvas>
        </div>
        <div class="pa-donut-legend">
          <div class="pa-legend-row">
            <div class="pa-legend-dot" style="background:#6366f1"></div>
            <span class="pa-legend-label">Online</span>
            <span class="pa-legend-amount">${fmtRs(onlineAmt)}</span>
            <span class="pa-legend-pct">${onlinePct}%</span>
          </div>
          <div class="pa-legend-row">
            <div class="pa-legend-dot" style="background:#10b981"></div>
            <span class="pa-legend-label">Cash</span>
            <span class="pa-legend-amount">${fmtRs(cashAmt)}</span>
            <span class="pa-legend-pct">${100-onlinePct}%</span>
          </div>
        </div>
      </div>

      <!-- Bar chart -->
      <div class="pa-chart-card">
        <h3>Monthly Collection Trend</h3>
        <p>Last 6 months — online vs cash</p>
        <div class="pa-chart-wrap">
          <canvas id="barCanvas" style="max-height:240px"></canvas>
        </div>
      </div>
    </div>

    <!-- RECENT ONLINE PAYMENTS -->
    <div class="pa-section">
      <div class="pa-section-header">
        <div class="pa-section-title"><span>📋</span> Recent Online Payments</div>
      </div>
      <div class="pa-table-card" id="recentTable"></div>
    </div>
  `;

  // ── Draw donut ────────────────────────────────────────────────────────────
  const dCtx = document.getElementById('donutCanvas').getContext('2d');
  donutChart = new Chart(dCtx, {
    type: 'doughnut',
    data: {
      labels: ['Online','Cash'],
      datasets:[{
        data: [onlineAmt || 0, cashAmt || 0],
        backgroundColor:['#6366f1','#10b981'],
        borderWidth: 0,
        hoverOffset: 6,
      }]
    },
    options:{
      responsive:true,
      maintainAspectRatio:true,
      cutout:'72%',
      plugins:{
        legend:{display:false},
        tooltip:{
          callbacks:{
            label: ctx => ` ${fmtRs(ctx.raw)}`
          }
        }
      }
    }
  });

  // ── Draw bar ──────────────────────────────────────────────────────────────
  // Build monthly labels from trend data
  const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const trendMap = {};
  (monthlyTrend || []).forEach(row => {
    const key = `${row._id.year}-${row._id.month}`;
    if(!trendMap[key]) trendMap[key] = { label: `${MONTH_NAMES[row._id.month-1]} ${String(row._id.year).slice(-2)}`, online:0, cash:0 };
    if(row._id.source==='online') trendMap[key].online += row.amount;
    else trendMap[key].cash += row.amount;
  });

  // If no trend data, show placeholder
  const trendKeys  = Object.keys(trendMap).sort();
  const trendLabels = trendKeys.length ? trendKeys.map(k=>trendMap[k].label) : ['No data'];
  const trendOnline = trendKeys.length ? trendKeys.map(k=>trendMap[k].online) : [0];
  const trendCash   = trendKeys.length ? trendKeys.map(k=>trendMap[k].cash) : [0];

  const bCtx = document.getElementById('barCanvas').getContext('2d');
  barChart = new Chart(bCtx, {
    type:'bar',
    data:{
      labels: trendLabels,
      datasets:[
        { label:'Online', data:trendOnline, backgroundColor:'#6366f1', borderRadius:5, borderSkipped:false },
        { label:'Cash',   data:trendCash,   backgroundColor:'#10b981', borderRadius:5, borderSkipped:false },
      ]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      plugins:{
        legend:{ position:'bottom', labels:{ boxWidth:10, padding:14, font:{size:11,weight:'bold'} } },
        tooltip:{
          callbacks:{ label: ctx => ` ${ctx.dataset.label}: ${fmtRs(ctx.raw)}` }
        }
      },
      scales:{
        x:{ grid:{display:false}, ticks:{font:{size:11}} },
        y:{
          grid:{color:'#f1f5f9'},
          ticks:{
            font:{size:11},
            callback: v => v >= 1000 ? `₹${(v/1000).toFixed(0)}k` : `₹${v}`
          }
        }
      }
    }
  });

  // ── Recent table ──────────────────────────────────────────────────────────
  const tableEl = document.getElementById('recentTable');
  if(!recentOnlinePayments || !recentOnlinePayments.length){
    tableEl.innerHTML = `<div class="pa-empty"><div class="pa-empty-icon">📭</div><p>No online payments yet</p></div>`;
    return;
  }

  tableEl.innerHTML = `
    <div class="pa-table-head">
      <span>Student</span>
      <span>Fee Head</span>
      <span>Month</span>
      <span>Amount</span>
      <span>Date · Payment ID</span>
    </div>
    ${recentOnlinePayments.map(p=>`
      <div class="pa-table-row">
        <div class="pa-cell name">${escHtml(p.studentName)}</div>
        <div class="pa-cell">${escHtml(p.feeHead)}</div>
        <div class="pa-cell">${escHtml(p.monthName)}</div>
        <div class="pa-cell amount">${fmtRs(p.amount)}</div>
        <div style="display:flex;flex-direction:column;gap:2px">
          <span class="pa-cell" style="font-size:12px">${fmtDate(p.paidAt)}</span>
          <span class="pa-cell pid" title="${escHtml(p.razorpayPaymentId||'')}">${escHtml(p.razorpayPaymentId||'—')}</span>
        </div>
      </div>
    `).join('')}
  `;
}

function escHtml(s){ const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }

// ── Init ──────────────────────────────────────────────────────────────────────
buildSessions();
loadAnalytics();
</script>
</body>
</html>
